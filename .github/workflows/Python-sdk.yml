name: cerberus-ai Python SDK

on:
  push:
    paths:
      - 'sdk/python/**'
    branches: [main, develop]
    tags:
      - 'v*-python'
  pull_request:
    paths:
      - 'sdk/python/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: sdk/python

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,openai,langchain,crewai]"

      - name: Lint (ruff)
        run: ruff check cerberus_ai/

      - name: Type check (mypy)
        run: mypy cerberus_ai/ --ignore-missing-imports

      - name: Run adversarial test suite
        run: pytest tests/adversarial/ -v --tb=short --no-cov

      - name: Run full test suite with coverage
        run: pytest tests/ -v --tb=short --cov=cerberus_ai --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: sdk/python/coverage.xml
          flags: python-sdk

  adversarial:
    name: Adversarial Robustness Suite
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install
        run: pip install -e ".[dev,openai,langchain,crewai]"

      - name: Run adversarial suite (38 attack categories)
        run: pytest tests/adversarial/test_evasion.py -v --tb=long --no-cov

      - name: Assert 0 false positives
        run: pytest tests/adversarial/test_evasion.py::TestFalsePositives -v --no-cov

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test, adversarial]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write   # OIDC for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI (trusted publishing — no API key needed)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          attestations: true   # SLSA provenance attestation
