<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080a0f"/>
      <stop offset="100%" style="stop-color:#0d1018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="1" fill="#1a1f2e"/>

  <!-- Shield icon -->
  <g transform="translate(80, 90)">
    <rect width="56" height="56" rx="12" fill="#dc2626"/>
    <path d="M28 8L12 15v10c0 9.3 6.4 18 16 20 9.6-2 16-10.7 16-20V15L28 8z" fill="white"/>
  </g>

  <!-- CERBERUS wordmark -->
  <text x="158" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="900" fill="white" letter-spacing="-2">CERBERUS</text>
  <text x="160" y="158" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="400" fill="#64748b" letter-spacing="3">AGENTIC AI RUNTIME SECURITY</text>

  <!-- Divider -->
  <rect x="80" y="178" width="380" height="1" fill="#1a1f2e"/>

  <!-- Tagline -->
  <text x="80" y="208" font-family="system-ui,-apple-system,sans-serif" font-size="15" fill="#94a3b8">Detect · Correlate · Interrupt — before data leaves your system</text>

  <!-- Right side — attack flow diagram -->
  <g transform="translate(660, 60)">
    <!-- L1 node -->
    <rect x="0" y="0" width="130" height="40" rx="8" fill="#0d1018" stroke="#1a1f2e" stroke-width="1"/>
    <text x="65" y="16" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">readDatabase()</text>
    <text x="65" y="32" font-family="monospace" font-size="10" fill="#fbbf24" text-anchor="middle">PII accessed</text>

    <!-- Arrow -->
    <line x1="130" y1="20" x2="155" y2="20" stroke="#1a1f2e" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- L1 badge -->
    <rect x="160" y="5" width="28" height="28" rx="6" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
    <text x="174" y="24" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">L1</text>

    <!-- L2 row -->
    <rect x="0" y="60" width="130" height="40" rx="8" fill="#0d1018" stroke="#1a1f2e" stroke-width="1"/>
    <text x="65" y="76" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">fetchWebpage()</text>
    <text x="65" y="92" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">injection found</text>
    <line x1="130" y1="80" x2="155" y2="80" stroke="#1a1f2e" stroke-width="1.5"/>
    <rect x="160" y="65" width="28" height="28" rx="6" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <text x="174" y="84" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">L2</text>

    <!-- L3 row -->
    <rect x="0" y="120" width="130" height="40" rx="8" fill="#0d1018" stroke="#1a1f2e" stroke-width="1"/>
    <text x="65" y="136" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">sendEmail()</text>
    <text x="65" y="152" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">exfiltration risk</text>
    <line x1="130" y1="140" x2="155" y2="140" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="160" y="125" width="28" height="28" rx="6" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>
    <text x="174" y="144" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">L3</text>

    <!-- BLOCKED badge -->
    <rect x="0" y="185" width="200" height="52" rx="8" fill="rgba(220,38,38,0.1)" stroke="rgba(220,38,38,0.4)" stroke-width="1"/>
    <text x="100" y="207" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">■ BLOCKED</text>
    <text x="100" y="226" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">score=3/4 · 0 bytes sent</text>

    <!-- Score display -->
    <text x="280" y="50" font-family="system-ui" font-size="56" font-weight="900" fill="white" text-anchor="middle">3</text>
    <text x="280" y="72" font-family="system-ui" font-size="13" fill="#64748b" text-anchor="middle">/4 risk score</text>
    <text x="280" y="105" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">INTERRUPT</text>
  </g>

  <!-- Bottom metadata -->
  <text x="80" y="258" font-family="monospace" font-size="11" fill="#334155">npm install @cerberus-ai/core</text>
  <text x="440" y="258" font-family="monospace" font-size="11" fill="#334155">·</text>
  <text x="460" y="258" font-family="monospace" font-size="11" fill="#334155">MIT licensed</text>
  <text x="580" y="258" font-family="monospace" font-size="11" fill="#334155">·</text>
  <text x="600" y="258" font-family="monospace" font-size="11" fill="#334155">cerberus.sixsenseenterprise.com</text>
</svg>
